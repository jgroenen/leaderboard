<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codeplatform Issue Leaderboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #42145f;
            --color-accent: #f092cd;
            --color-open-pink: #f092cd;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #fff;
            color: #333;
            line-height: 1.6;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background: var(--color-open-pink);
            color: var(--color-primary);
            padding: 20px 0;
            margin-bottom: 30px;
        }

        header .content {
            display: flex;
            align-items: center;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header img.logo {
            height: 44px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 100;
            margin: 0;
            color: var(--color-primary);
        }

        header .subtitle {
            font-size: 1rem;
            opacity: 0.85;
            margin-top: 5px;
            color: var(--color-primary);
        }

        .leaderboard-item {
            position: relative;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 15px;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            border: 1px solid #e0e0e0;
            transition: box-shadow 0.2s, transform 0.2s;
            width: 100%;
            background: #F9F9F9;
        }

        .issue-details {
            flex: 1;
            min-width: 0;
        }

        .issue-title {
            font-size: 1.1rem;
            font-weight: 100;
            color: var(--color-primary);
            padding: 10px;
        }

        .issue-title a {
            color: var(--color-primary);
            text-decoration: none;
        }

        .issue-title a:hover {
            text-decoration: underline;
            color: #3d1a6e;
        }

        .issue-desc {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.6;
            padding: 0 10px 10px;
        }

        .issue-number {
            background: #f5f5f5;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 500;
            color: var(--color-primary);
        }

        .likes-badge {
            background-color: #EEE;
            color: #155724;
            padding: 8px 16px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 6px;
            width: 80px;
            position: absolute;
            top: 0;
            right: 0;
        }

        .likes-badge .thumbs-up {
            font-size: 1.1rem;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--color-primary);
        }

        @media (max-width: 768px) {
            .leaderboard-item {
                flex-direction: column;
                align-items: stretch;
            }

            .likes-badge {
                align-self: flex-end;
            }

            header .content {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="content">
        <img src="https://code.overheid.nl/assets/img/logo-codeoverheid.png" alt="Code.overheid.nl logo" class="logo">
        <div>
            <h1>Issue Leaderboard</h1>
        </div>
    </div>
</header>

<div class="container">
    <div id="leaderboardList"></div>
</div>

<script>
    const FORGEJO_URL = "https://code.overheid.nl";
    const OWNER = "MinBZK";
    const REPO = "Codeplatform";
    const TOKEN = "";

    let finalJsonData = null;

    async function fetchLeaderboard() {
        const leaderboardList = document.getElementById('leaderboardList');
        leaderboardList.innerHTML = "";

        let leaderboardData = [];
        let page = 1;
        let hasMore = true;

        const headers = {
            "Accept": "application/json",
            ...(TOKEN && { "Authorization": `token ${TOKEN}` })
        };

        while (hasMore) {
            const url = `${FORGEJO_URL}/api/v1/repos/${OWNER}/${REPO}/issues?state=all&page=${page}&limit=50`;

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    mode: 'cors',
                    credentials: 'omit',
                    headers
                });

                if (!response.ok) {
                    const errorText = await response.text().catch(() => 'Geen details beschikbaar');
                    throw new Error(`${response.status} ${response.statusText}: ${errorText}`);
                }

                const issues = await response.json();

                if (!issues || issues.length === 0) {
                    hasMore = false;
                    break;
                }

                const issuesWithReactions = await Promise.all(
                    issues.map(async (issue) => {
                        if (issue.pull_request) return null;

                        let likes = 0;
                        try {
                            if (issue.reactions) {
                                console.log(`Issue ${issue.number} heeft reactions in issue object:`, issue.reactions);
                                if (typeof issue.reactions === 'object') {
                                    likes = (issue.reactions['+1'] || 0) + (issue.reactions['thumbs_up'] || 0);
                                } else if (Array.isArray(issue.reactions)) {
                                    likes = issue.reactions.filter(r => r.content === "+1" || r.content === "thumbs_up").length;
                                }
                            } else {
                                const reactionsUrl = `${FORGEJO_URL}/api/v1/repos/${OWNER}/${REPO}/issues/${issue.number}/reactions`;
                                console.log(`Probeer reactions op te halen voor issue ${issue.number}: ${reactionsUrl}`);
                                const reactionsResponse = await fetch(reactionsUrl, {
                                    method: 'GET',
                                    mode: 'cors',
                                    credentials: 'omit',
                                    headers
                                });
                                if (reactionsResponse.ok) {
                                    const reactions = await reactionsResponse.json();
                                    console.log(`Reactions voor issue ${issue.number}:`, reactions);
                                    likes = reactions.filter(r => r.content === "+1" || r.content === "thumbs_up").length;
                                } else {
                                    console.log(`Reactions endpoint returnerde ${reactionsResponse.status} voor issue ${issue.number}`);
                                }
                            }
                        } catch (e) {
                            console.log(`Reactions endpoint niet beschikbaar voor issue ${issue.number}:`, e.message);
                        }

                        console.log(`Issue ${issue.number} (${issue.title}): ${likes} likes`);
                        return {
                            issue: issue.html_url,
                            title: issue.title,
                            description: issue.body || "",
                            likes: likes,
                            number: issue.number
                        };
                    })
                );

                leaderboardData.push(...issuesWithReactions.filter(Boolean));
                page++;
            } catch (error) {
                console.error('Fout:', error.message);
                throw error;
            }
        }

        leaderboardData.sort((a, b) => b.likes - a.likes);
        console.log('Gesorteerde leaderboard:', leaderboardData);
        finalJsonData = { leaderboard: leaderboardData };

        if (leaderboardData.length === 0) {
            leaderboardList.innerHTML = '<div class="empty-state"><h3>Geen issues gevonden</h3><p>Er zijn momenteel geen issues in deze repository.</p></div>';
        } else {
            leaderboardData.forEach(item => {
                const itemEl = document.createElement('div');
                itemEl.className = 'leaderboard-item';
                const desc = item.description ? escapeHtml(item.description.substring(0, 200)) : '<i>Geen omschrijving</i>';
                itemEl.innerHTML = `
                    <div class="issue-details">
                        <h3 class="issue-title">
                            <a href="${item.issue}" target="_blank">${escapeHtml(item.title)}</a>
                            <span class="issue-number">#${item.number}</span>
                        </h3>
                        <div class="issue-desc" title="${escapeHtml(item.description)}">${desc}</div>
                        
                    </div>
                    <div class="likes-badge">
                        <span class="thumbs-up">👍</span>
                        <span>${item.likes}</span>
                    </div>
                `;
                leaderboardList.appendChild(itemEl);
            });
        }


    }

    function escapeHtml(text) {
        if (!text) return "";
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function loadAndRefresh() {
        fetchLeaderboard().catch(() => {});
        setInterval(() => {
            fetchLeaderboard().catch(() => {});
        }, 15000);
    }

    window.addEventListener('load', loadAndRefresh);
</script>

</body>
</html>
